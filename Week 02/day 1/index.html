<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <title>Learning-CSS day 1</title>

<style>

/* Internal CSS  */

*{
    margin: 0;
    padding: 0;
    
}

#hero{
    background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('../images/background-image.jpg');
    height: 100vh;
    width: 100vw;
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
}

.hero-title{
    color: #ffffff;
    font-size: 6rem;
    padding: 20px 40px;
    margin: 0;
    font-family: sans-serif;
    line-height: 1.05;
    text-shadow: 2px 4px 10px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.03);
}

.hero-btn{
    margin: 20px 40px;
    padding: 12px 20px;
    color: white;
    font-size: 1.2rem;
    background-color: rgba(62,122,204,0.95);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(62,122,204,0.25), 0 2px 6px rgba(0,0,0,0.35);
}

</style>


</head>
<body>

    <!-- Hero Section  -->
    
<section id="hero">
    <h1 class="hero-title">Explore <br/>
        Northern Pakistan</h1>

        <button class="hero-btn">Explore now <i class="ri-arrow-right-line"></i></button>

</section>

</body>
</html>
