<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    <title>Learning-CSS day 1</title>

<style>

/* Internal CSS  */

*{
    margin: 0;
    padding: 0;
    
}

#hero{
    
    background-image: url('../images/background-image.jpg');
    height: 100vh;
    width: 100vw;
    background-size: cover;
    background-position: center;
}

.hero-title{
    color: white;
    font-size: 6rem;
    padding: 20px;
    padding-top: 25vh;
    font-family: sans-serif;

}

.hero-btn{
    
    margin: 20px;
    padding: 10px;
    color: white;
    font-size: 1.5rem;
    background-color: #3e7acc;
    border: none;
    border-radius: 15px;
    cursor: pointer;

}

</style>


</head>
<body>

    <!-- Hero Section  -->
    
<section id="hero">
    <h1 class="hero-title">Explore <br/>
        Northern Pakistan</h1>

        <button class="hero-btn">Explore now <i class="ri-arrow-right-line"></i></button>

</section>

</body>
</html>
